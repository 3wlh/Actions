name: "OpenWrt Feed"
description: "OpenWrt Feed"

outputs:
  repo-path:
    value: ${{ steps.repo_path.outputs.path }}

runs:
  using: "composite"
  steps:
    - name: Initialize configuration
      shell: bash
      run: |
        # 开始初始化
        echo "✅ 创建文件目录"
        echo "repo_dir=$(mktemp -d)" >> $GITHUB_ENV
        echo "usign_dir=$(mktemp -d)" >> $GITHUB_ENV
        echo "opkg_dir=$(mktemp -d)" >> $GITHUB_ENV
        echo "✅ 初始化完成"

    - name: Git Clone Repositories
      working-directory: ${{ env.repo_dir }}
      env:
        url: ${{ env.url }}
        pub: https://github.com/3wlh/OpenWrt_Packages/releases/download/key/mime.pub
      id: repo_path
      run: |
        # 仓库拉取
        echo "✅ 拉取仓库"
        git clone --depth=1 "${url}"
        test -d "bin" || mkdir -p "bin"
        test -f "mime.pub" || wget -q -O mime.pub "${pub}"
        echo "path=$(pwd)" >> $GITHUB_OUTPUT

    - name: Install usign
      working-directory: ${{ env.usign_dir }}
      env:
        file: ${{ env.repo_dir }}/bin/usign
        url: "https://github.com/openwrt/usign.git"
      shell: bash
      run: |
        # 安装 Usign
        if [[ ! -f ${file} ]]; then
          echo "✅拉取仓库: ${url}"
          git clone --depth=1 "${url}"
          files=$(find . -type f -name "*.c")
          echo "✅编译源码: ${files}"
          gcc -Os -s -std=gnu99 -Wall -Werror "${files}" -o "${file}" || {
            echo "❌usign编译源码失败"
          }
        fi

        if [[ -f ${file} ]]; then
          echo "✅安装 Usign"
          sudo cp -f "${file}" /usr/local/bin/usign || echo "❌复制文件失败"
          # 验证安装
          if command -v usign &>/dev/null; then
            echo "✅Usign 安装成功: $(usign --version 2>/dev/null || echo "版本检测成功")"
          else
            echo "❌Usign 安装后无法执行"
          fi
        else
          echo "❌编译失败，未生成 usign 可执行文件"
        fi

    - name: Install ipkg-make-index
      working-directory: ${{ env.ipkg_dir }}
      env:
        file: ${{ env.repo_dir }}/bin/ipkg-make-index.sh
        url: "https://raw.githubusercontent.com/openwrt/openwrt/refs/heads/main/scripts/ipkg-make-index.sh"
      shell: bash
      run: |
        # 安装 ipkg-make-index
        if [[ ! -f ${file} ]]; then
          echo "✅下载脚本: ${url}"
          curl -# -L --fail "${url}" -o ${file}
          sed -i -e 's/$MKHASH sha256 $pkg/sha256sum $pkg | cut -d" " -f1/' -e 's/$sed_safe_pkg/$(basename ${sed_safe_pkg})/' ${file}
        fi
        echo "✅安装脚本: $(basename ${file} .sh)"
        sudo ln -fs ${file} /bin/$(basename ${file} .sh)

    - name: Install Script
      env:
        script: ${{ github.workspace }}/.github
      shell: bash
      run: |
        # 安装 Script
        chmod -R 755 "$(pwd)/.shell" "$(pwd)/.packages"
        for file in $(pwd)/.shell/*.sh $(pwd)/.packages/*.sh; do
          if [[ -f ${file} ]]; then
            echo "✅安装脚本: ${file}"
            name=$(basename ${file} .sh)
            if sudo ln -fs "${file}" "/bin/${name}"; then
              echo "$(date '+%Y-%m-%d %H:%M:%S') - ✅ ${name} 软链接创建成功 [/bin/${name} -> ${file}]"
            else
              # 失败时输出错误日志，便于排查问题
              echo "$(date '+%Y-%m-%d %H:%M:%S') - ❌ ${name} 软链接创建失败 [目标路径：/bin/${name}，源文件：${file}]" >&2
            fi
          fi
        done
