name: Actions Remove Commits
on:
  repository_dispatch:
  workflow_dispatch:      
    inputs:
      repos:
        description: "要清理的仓库"
        required: false
        default: "all"
        type: choice
        options:        
          - "3wlh/3wlh.github.io"
          - "3wlh/Script"
          - "3wlh/Source"
          - "3wlh/OpenWrt_Packages"
          - "3wlh/Source_E"
          - "3wlh/Source"

env:
  #repo_url: https://3wlh:${{ secrets.TOKEN_GITHUB }}@github.com/${{ inputs.repos }}
  repo_url: https://cnb:${{ secrets.TOKEN_CNB }}@cnb.cool/${{ inputs.repos }}
  
jobs:
  job:
    name: Remove ${{ inputs.repos }} Commits
    runs-on: ubuntu-latest
    steps:
    - name: init
      run : |
        # 初始化数据
        echo "repo_dir=$(mktemp -d)" >> $GITHUB_ENV   
    
    - name: Git Clone Repositories
      working-directory: ${{ env.repo_dir }}
      run : |
        git clone ${{ env.repo_url }} $(pwd)
    
    - name: Git Remove Commits
      uses: 3wlh/actions/git/remove-commits@main
      with:
        repo_url: ${{ env.repo_url }}
        repo_path: ${{ env.repo_dir }}