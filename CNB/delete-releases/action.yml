name: "CNB Delete Releases"
description: "Github Action for deleting CNB Releases and tags"
author: "cnb"
inputs:
  token:
    description: "Authorized CNB Personal Access Token"
    required: true
  repo:
    description: "Repository in <owner>/<repo> format"
    required: false
  tag_name:
    description: "Tag name to delete. Use * for wildcard matching (e.g., v1.* or *_test_*). Without * = exact match. Default: only delete tag, set delete_release=true to also delete release"
    required: false
  delete_release:
    description: "Also delete the release. Defaults to true (set to false to only delete tag)"
    required: false
    default: "true"
  api_url:
    description: "CNB API URL"
    required: false
    default: "https://api.cnb.cool"
outputs:
  deleted_releases:
    description: "JSON array of deleted release tag names"
  deleted_tags:
    description: "JSON array of deleted git tag names"
runs:
  using: "node20"
  main: "dist/index.js"
branding:
  color: "red"
  icon: "trash-2"
