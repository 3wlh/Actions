name: "OpenWrt SDK"
description: "安装OpenWrt SDK"
inputs:
  arch:
    description: "OpenWrt架构（aarch64_generic|x86_64）"
    type: string
    required: true
  version:
    description: "OpenWrt版本（如24.10.0）"
    type: string
    required: true
  path:
    description: "工具链安装目录"
    type: string
    default: ${{ github.workspace }}

outputs:
  status:
    description: "工具链安装状态（success/failed）"
    value: ${{ steps.download-toolchain.outputs.status }}
  sdk-path:
    description: "工具链实际安装路径"
    value: ${{ inputs.path }}

runs:
  using: "composite"
  steps:
    - name: Initialize configuration
      id: init
      shell: bash
      env:
        arch: ${{ inputs.arch }}
        version: ${{ inputs.version }}
        url: https://downloads.openwrt.org/releases/
      run: |
        # 开始初始化数据
        echo "::notice::✅ 开始初始化 ${arch} 架构 ${version} 版本的配置"

        # 架构匹配逻辑
        case $arch in
          aarch64_generic)
            sdk_path="layerscape/armv8_64b"
            sdk_name="-sdk-.*-armv8_64b_"
            ;;
          x86_64)
            sdk_path="x86/64"
            sdk_name="-sdk-.*-x86-64_"
            ;;
          *)
            echo "::error::❌ 不支持的架构：${arch}，仅支持aarch64_generic/x86_64"
            exit 1
            ;;
        esac

        # 版本格式修正
        version=$([[ $version =~ ^[0-9]+\.[0-9]+$ ]] && echo "${version}.0" || echo "$version")

        # 内部环境变量：步骤间共享
        test -d "${{ inputs.path }}" || mkdir -pm 755 "${{ inputs.path }}"
        echo "sdk_url=$url/$version/targets/$sdk_path" >> $GITHUB_ENV
        echo "sdk_name=$sdk_name" >> $GITHUB_ENV
        echo "::notice::✅ 初始化完成，SDK地址：$url/$version/targets/$sdk_path"

    - name: Setup Cache
      uses: actions/cache@v4
      with:
        path: ${{ inputs.path }}
        key: openwrt-sdk-${{ inputs.arch }}-${{ inputs.version }}
        restore-keys: |
          openwrt-toolchain-${{ inputs.arch }}-

    - name: Download and Unzip ToolChain
      id: download-sdk
      shell: bash
      env:
        url: ${{ env.sdk_url }}
        name: ${{ env.sdk_name }}
      working-directory: ${{ inputs.path }}
      run: |
        # 下载安装OpenWrt SDK
        echo "status=failed" >> $GITHUB_OUTPUT

        # 检查目录大小（判断是否已缓存）
        dir_size=$(du -s $(pwd) | awk '{ print $1 }')
        if [[ $dir_size -lt 51200 ]]; then
          echo "::notice::✅ 目录大小 ${dir_size}KB < 50MB，开始下载OpenWrt SDK"
          
          # 检查URL是否有效
          http_code=$(curl -s -o /dev/null -w "%{http_code}" -X GET "${url}")
          if [[ $http_code -ge 400 ]]; then
            echo "::error::❌ SDK地址无法访问，HTTP状态码：${http_code}，地址：${url}"
            exit 1
          fi
          
          # 获取SHA256和文件名
          text="$(wget -qO- "${url}/sha256sums" | grep -- "${name}" | sed 's/*//g')"
          if [[ -z "${text}" ]]; then
            echo "::error::❌ 未找到匹配的SDK文件，架构：${{ inputs.arch }}，版本：${{ inputs.version }}"
            exit 1
          fi
          
          file="$(echo ${text} | cut -d' ' -f2 | sed 's/*//g')"
          verify="$(echo ${text} | cut -d' ' -f1)"
          if [[ -z "${file}" || -z "${verify}" ]]; then
            echo "::error::❌ 无法解析SDK文件名或校验值，原始数据：${text}"
            exit 1
          fi
          
          # 下载文件
          echo "::notice::✅ 开始下载SDK文件：${file}"
          if ! wget -qO "${file}" "${url}/${file}"; then
            echo "::error::❌ 文件下载失败：${url}/${file}"
            exit 1
          fi
          
          # 校验SHA256
          file_sha256=$(sha256sum ${file} | awk '{print $1}')
          if [[ "$file_sha256" != "$verify" ]]; then
            echo "::error::❌ SHA256校验失败，本地：${file_sha256}，预期：${verify}"
            exit 1
          fi
          echo "::notice::✅ SHA256校验通过"
          
          # 解压文件
          echo "::notice::✅ 开始解压SDK文件：${file}"
          if ! tar -I zstd -xf "${file}" --strip-components=1; then
            echo "::error::❌ 文件解压失败"
            exit 1
          fi
          rm -rf ${file}
          echo "::notice::✅ SDK解压完成，已删除压缩包"
        else
          echo "::notice::✅ 缓存命中，跳过下载，直接使用缓存的工具链"
        fi
        echo "::notice::✅ 开始配置环境"
        test -d "dl" && rm -rf "dl" || true
        test -d "feeds" && rm -rf "feeds" || true
        test -d "${{ env.CACHE_DIR }}/bin/packages" && rm -rf ${{ env.CACHE_DIR }}/bin/packages
        cp feeds.conf.default feeds.conf
        sed -i 's,git.openwrt.org/openwrt/openwrt/,github.com/openwrt/openwrt/,' feeds.conf
        sed -i 's,git.openwrt.org/feed/packages/,github.com/openwrt/packages/,' feeds.conf
        sed -i 's,git.openwrt.org/project/luci/,github.com/openwrt/luci/,' feeds.conf
        sed -i 's,git.openwrt.org/feed/telephony/,github.com/openwrt/telephony/,' feeds.conf
        # 输出最终状态为成功
        echo "status=success" >> $GITHUB_OUTPUT
        echo "::notice::✅ OpenWrt SDK 安装完成！"