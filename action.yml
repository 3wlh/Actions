name: "Actions Delete Commits"
description: "Delete Commits"
author: aparcar
inputs:
  token:
    description: "GitHub token with write permission"
    required: false
    default: ${{ github.token }}
runs:
  using: "composite"
  steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        repository: ${{ github.repository }}
        fetch-depth: 0
        token: ${{ inputs.token }}

    - name: Git Erase Commits
      shell: bash
      run: |
        # 配置 Git 用户身份
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

        # 获取当前默认分支名称（如 main/master）
        branch=$(git rev-parse --abbrev-ref HEAD)
        echo "Current branch: $branch"

        # 创建孤儿分支（无任何提交历史）
        git checkout --orphan latest_branch

        # 添加所有文件到暂存区（屏蔽无关输出
        # git add -A >/dev/unll
        git add -A

        # 提交更改
        git commit -m "Reset commit history - $(date +%Y-%m-%d\ %H:%M:%S)"

        # 强制删除原分支（-D 强制删除，避免分支未合并的提示）
        git branch -d ${branch}

        # 将新分支重命名为原分支名
        git branch -m ${branch}

        # 清理Git仓库（优化空间，删除无用对象）
        git gc --prune=now --aggressive

        # 强制推送到远程仓库（需确保分支无保护规则）
        git push --force origin ${branch}

        # 重新关联本地分支与远程分支
        git branch --set-upstream-to=origin/${branch} ${branch}
