name: "CNB Delete Releases"
description: "Github Action for deleting CNB Releases and tags"
author: "cnb"
inputs:
  token:
    description: "Authorized CNB Personal Access Token"
    required: true
  repository:
    description: "Repository in <owner>/<repo> format"
    required: false
  tag_name:
    description: "Tag name to delete. Use * for wildcard matching (e.g., v1.* or *_test_*). Without * = exact match"
    required: false
  api_url:
    description: "CNB API URL"
    required: false
    default: "https://api.cnb.cool"
outputs:
  deleted_releases:
    description: "JSON array of deleted release tag names"
  deleted_tags:
    description: "JSON array of deleted git tag names"
runs:
  using: "node24"
  main: "dist/index.js"
branding:
  color: "red"
  icon: "trash-2"
