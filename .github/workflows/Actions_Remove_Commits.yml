name: Actions Remove Commits
on:
  repository_dispatch:
  workflow_dispatch:      
    inputs:
      repos:
        description: "Select the Repositories"
        required: false
        default: "all"
        type: choice
        options:        
          - 3wlh.github.io
          - OpenWrt
          - Script
          - Yi_Source
          - Source
          - Actions-Build_ImmortalWrt
          - OpenWrt_Packages

env:
  repo_url: https://3wlh:${{ secrets.TOKEN_GITHUB }}@github.com/3wlh/${{ inputs.repos }}

jobs:
  job:
    name: Remove ${{ inputs.repos }} Commits
    runs-on: ubuntu-latest
    steps:
    - name: init
      run : |
        # 初始化数据
        echo "repo_dir=$(mktemp -d)" >> $GITHUB_ENV   
    
    - name: Git Clone Repositories
      working-directory: ${{ env.repo_dir }}
      run : |
        git clone ${{ env.repo_url }} $(pwd)
    
    - name: Git Remove Commits
      uses: 3wlh/actions/git/remove-commits@main
      with:
        repo_url: ${{ env.repo_url }}
        repo_path: ${{ env.repo_dir }}