name: Actions Remove Commits
on:
  repository_dispatch:
  workflow_dispatch:      
    inputs:
      repos:
        description: "要清理的仓库"
        required: false
        type: choice
        options:        
          - "3wlh/3wlh.github.io"
          - "3wlh/Script"
          - "3wlh/Source"
          - "3wlh/OpenWrt_Packages"
          - "3wlh/Source_E"
          - "3wlh/Source"
      
      platform:
        description: "要清理哪个平台的仓库"
        required: false
        type: choice
        options:        
          - "GitHub"
          - "CNB"
          - "Gitee"

env:
  github_url: https://${{ secrets.TOKEN_GITHUB }}@github.com/${{ inputs.repos }}
  cnb_url: https://cnb:${{ secrets.TOKEN_CNB }}@cnb.cool/${{ inputs.repos }}
  gitee_url: https://${{ secrets.TOKEN_GITHUB }}@github.com/git_${{ inputs.repos }}
  repo_url: ${{ inputs.platform == 'GitHub' && env.github_url
             || inputs.platform == 'CNB'   && env.cnb_url
             || inputs.platform == 'Gitee' && env.gitee_url }}
             
jobs:
  job:
    name: Remove ${{ inputs.repos }} Commits
    runs-on: ubuntu-latest
    steps:
    - name: init
      run : |
        # 初始化数据
        echo "repo_dir=$(mktemp -d)" >> $GITHUB_ENV
        
        
    
    - name: Git Clone Repositories
      working-directory: ${{ env.repo_dir }}
      run : |
        git clone ${{ env.repo_url }} $(pwd)
    
    - name: Git Remove Commits
      uses: 3wlh/actions/git/remove-commits@main
      with:
        repo_url: ${{ env.repo_url }}
        repo_path: ${{ env.repo_dir }}