name: "CNB Release"
description: "Github Action for creating CNB (Cloud Native Build) Releases"
author: "cnb"
inputs:
  body:
    description: "Note-worthy description of changes in release"
    required: false
  body_path:
    description: "Path to load note-worthy description of changes in release from"
    required: false
  name:
    description: "Gives the release a custom name. Defaults to tag name"
    required: false
  tag_name:
    description: "Gives a tag name. Defaults to github.ref_name"
    required: false
  draft:
    description: "Creates a draft release. Defaults to false"
    required: false
  prerelease:
    description: "Identify the release as a prerelease. Defaults to false"
    required: false
  files:
    description: "Newline-delimited list of path globs for asset files to upload"
    required: false
  working_directory:
    description: "Base directory to resolve 'files' globs against (defaults to job working-directory)"
    required: false
  fail_on_unmatched_files:
    description: "Fails if any of the `files` globs match nothing. Defaults to false"
    required: false
  repository:
    description: "Repository to make releases against, in <owner>/<repo> format"
    required: false
  token:
    description: "Authorized CNB Personal Access Token"
    required: true
  target_commitish:
    description: "Commitish value that determines where the Git tag is created from. Can be any branch or commit SHA."
    required: false
    default: "main"
  make_latest:
    description: "Specifies whether this release should be set as the latest release. Can be `true`, `false`, or `legacy`"
    required: false
  api_url:
    description: "CNB API URL. Defaults to https://api.cnb.cool"
    required: false
    default: "https://api.cnb.cool"
outputs:
  url:
    description: "URL to the Release HTML Page"
    value: ${{ steps.release.outputs.url }}
  id:
    description: "Release ID"
    value: ${{ steps.release.outputs.id }}
  upload_url:
    description: "URL for uploading assets to the release"
    value: ${{ steps.release.outputs.upload_url }}
  assets:
    description: "JSON array containing information about each uploaded asset"
    value: ${{ steps.release.outputs.assets }}
runs:
  using: "composite"
  steps:
    - name: Create Release
      id: release
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      env:
        INPUT_TOKEN: ${{ inputs.token }}
        INPUT_API_URL: ${{ inputs.api_url }}
        INPUT_REPOSITORY: ${{ inputs.repository }}
        INPUT_TAG_NAME: ${{ inputs.tag_name }}
        INPUT_NAME: ${{ inputs.name }}
        INPUT_BODY: ${{ inputs.body }}
        INPUT_BODY_PATH: ${{ inputs.body_path }}
        INPUT_DRAFT: ${{ inputs.draft }}
        INPUT_PRERELEASE: ${{ inputs.prerelease }}
        INPUT_TARGET_COMMITISH: ${{ inputs.target_commitish }}
        INPUT_MAKE_LATEST: ${{ inputs.make_latest }}
        INPUT_FILES: ${{ inputs.files }}
        INPUT_FAIL_ON_UNMATCHED_FILES: ${{ inputs.fail_on_unmatched_files }}
        GITHUB_REF_NAME: ${{ github.ref_name }}
        GITHUB_REPOSITORY: ${{ github.repository }}
      run: |
        set -e

        API_URL="${INPUT_API_URL:-https://api.cnb.cool}"
        REPO="${INPUT_REPOSITORY:-$GITHUB_REPOSITORY}"
        TAG_NAME="${INPUT_TAG_NAME:-$GITHUB_REF_NAME}"
        RELEASE_NAME="${INPUT_NAME:-$TAG_NAME}"
        TARGET_COMMITISH="${INPUT_TARGET_COMMITISH:-main}"
        DRAFT="${INPUT_DRAFT:-false}"
        PRERELEASE="${INPUT_PRERELEASE:-false}"
        MAKE_LATEST="${INPUT_MAKE_LATEST}"
        FAIL_ON_UNMATCHED="${INPUT_FAIL_ON_UNMATCHED_FILES:-false}"
        FILES="${INPUT_FILES}"

        if [ -z "$INPUT_TOKEN" ]; then
          echo "::error::token is required"
          exit 1
        fi

        if [ -z "$REPO" ]; then
          echo "::error::repository is required"
          exit 1
        fi

        if [ -z "$TAG_NAME" ]; then
          echo "::error::tag_name is required"
          exit 1
        fi

        BODY=""
        if [ -n "$INPUT_BODY_PATH" ] && [ -f "$INPUT_BODY_PATH" ]; then
          BODY=$(cat "$INPUT_BODY_PATH")
        elif [ -n "$INPUT_BODY" ]; then
          BODY="$INPUT_BODY"
        fi

        JSON_PAYLOAD=$(cat <<EOF
        {
          "tag_name": "$TAG_NAME",
          "name": "$RELEASE_NAME",
          "body": $(echo "$BODY" | jq -Rs .),
          "draft": $DRAFT,
          "prerelease": $PRERELEASE,
          "target_commitish": "$TARGET_COMMITISH"$([ -n "$MAKE_LATEST" ] && echo ", \"make_latest\": \"$MAKE_LATEST\"" || echo "")
        }
        EOF
        )

        echo "::debug::Creating release $TAG_NAME for $REPO"

        RESPONSE=$(curl --connect-timeout 10 --max-time 60 -s -w "\n%{http_code}" -X POST \
          "${API_URL}/${REPO}/-/releases" \
          -H "Authorization: Bearer ${INPUT_TOKEN}" \
          -H "Content-Type: application/json" \
          -H "Accept: application/vnd.cnb.api+json" \
          -d "$JSON_PAYLOAD")

        HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
        BODY=$(echo "$RESPONSE" | sed '$d')

        if [ "$HTTP_CODE" = "409" ]; then
          echo "::warning::Release already exists, fetching existing release..."
          GET_RESPONSE=$(curl --connect-timeout 10 --max-time 60 -s -w "\n%{http_code}" -X GET \
            "${API_URL}/${REPO}/-/releases/tags/${TAG_NAME}" \
            -H "Authorization: Bearer ${INPUT_TOKEN}" \
            -H "Accept: application/vnd.cnb.api+json")
          GET_HTTP_CODE=$(echo "$GET_RESPONSE" | tail -n1)
          BODY=$(echo "$GET_RESPONSE" | sed '$d')
          if [ "$GET_HTTP_CODE" != "200" ]; then
            echo "::error::Failed to get existing release (HTTP $GET_HTTP_CODE): $BODY"
            exit 1
          fi
          HTTP_CODE="201"
        fi

        if [ "$HTTP_CODE" != "201" ]; then
          echo "::error::Failed to create release (HTTP $HTTP_CODE): $BODY"
          exit 1
        fi

        RELEASE_ID=$(echo "$BODY" | jq -r '.id')
        RELEASE_URL=$(echo "$BODY" | jq -r '.html_url // ""')
        UPLOAD_URL="${API_URL}/${REPO}/-/releases/${RELEASE_ID}/assets"

        echo "url=$RELEASE_URL" >> $GITHUB_OUTPUT
        echo "id=$RELEASE_ID" >> $GITHUB_OUTPUT
        echo "upload_url=$UPLOAD_URL" >> $GITHUB_OUTPUT

        echo "::notice::Release created: $RELEASE_URL"

        ASSETS="[]"

        echo "::debug::FILES input: $FILES"

        if [ -n "$FILES" ]; then
          ALL_FILES=""
          while IFS= read -r pattern; do
            [ -z "$pattern" ] && continue
            echo "::debug::Matching pattern: $pattern"
            if [[ "$pattern" == /* ]]; then
              shopt -s nullglob
              MATCHES=$(ls -1 $pattern 2>/dev/null || true)
              shopt -u nullglob
            else
              shopt -s nullglob
              MATCHES=$(ls -1 $pattern 2>/dev/null || true)
              shopt -u nullglob
            fi
            echo "::debug::Matches found: $MATCHES"
            if [ -z "$MATCHES" ] && [ "$FAIL_ON_UNMATCHED" = "true" ]; then
              echo "::error::No files matched pattern: $pattern"
              exit 1
            fi
            for f in $MATCHES; do
              if [ -f "$f" ]; then
                ALL_FILES="$ALL_FILES$f"$'\n'
              fi
            done
          done <<< "$FILES"
          
          echo "::debug::All files to upload: $ALL_FILES"
          
          UPLOADED_ASSETS="[]"
          
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            FILENAME=$(basename "$file")
            echo "::notice::Uploading asset: $FILENAME"
            
            STEP1_RESPONSE=$(curl --connect-timeout 10 --max-time 60 -s -w "\n%{http_code}" -X POST \
              "${API_URL}/${REPO}/-/releases/${RELEASE_ID}/asset-upload-url" \
              -H "Authorization: Bearer ${INPUT_TOKEN}" \
              -H "Content-Type: application/json" \
              -H "Accept: application/vnd.cnb.api+json" \
              -d "{\"asset_name\": \"${FILENAME}\", \"overwrite\": true}")
            
            STEP1_HTTP_CODE=$(echo "$STEP1_RESPONSE" | tail -n1)
            STEP1_BODY=$(echo "$STEP1_RESPONSE" | sed '$d')
            
            if [ "$STEP1_HTTP_CODE" != "201" ]; then
              echo "::warning::Failed to get upload URL for $FILENAME (HTTP $STEP1_HTTP_CODE): $STEP1_BODY"
              continue
            fi
            
            UPLOAD_URL=$(echo "$STEP1_BODY" | jq -r '.upload_url')
            VERIFY_URL=$(echo "$STEP1_BODY" | jq -r '.verify_url')
            
            echo "::debug::Upload URL: $UPLOAD_URL"
            echo "::debug::Verify URL: $VERIFY_URL"
            
            STEP2_RESPONSE=$(curl --connect-timeout 10 --max-time 300 -s -w "\n%{http_code}" -X PUT \
              "$UPLOAD_URL" \
              -H "Content-Type: application/octet-stream" \
              --data-binary "@$file")
            
            STEP2_HTTP_CODE=$(echo "$STEP2_RESPONSE" | tail -n1)
            
            if [ "$STEP2_HTTP_CODE" != "200" ] && [ "$STEP2_HTTP_CODE" != "201" ]; then
              echo "::warning::Failed to upload $FILENAME (HTTP $STEP2_HTTP_CODE)"
              continue
            fi
            
            STEP3_RESPONSE=$(curl --connect-timeout 10 --max-time 60 -s -w "\n%{http_code}" -X POST \
              "$VERIFY_URL" \
              -H "Authorization: Bearer ${INPUT_TOKEN}" \
              -H "Accept: application/vnd.cnb.api+json")
            
            STEP3_HTTP_CODE=$(echo "$STEP3_RESPONSE" | tail -n1)
            STEP3_BODY=$(echo "$STEP3_RESPONSE" | sed '$d')
            
            if [ "$STEP3_HTTP_CODE" = "200" ] || [ "$STEP3_HTTP_CODE" = "201" ]; then
              UPLOADED_ASSETS=$(echo "$UPLOADED_ASSETS" | jq --argjson asset "$STEP3_BODY" '. + [$asset]' 2>/dev/null || echo "$UPLOADED_ASSETS")
              echo "::notice::Uploaded: $FILENAME"
            else
              echo "::warning::Failed to confirm upload for $FILENAME (HTTP $STEP3_HTTP_CODE): $STEP3_BODY"
            fi
          done <<< "$ALL_FILES"
          
          ASSETS="$UPLOADED_ASSETS"
        fi

        echo "assets=$ASSETS" >> $GITHUB_OUTPUT
branding:
  color: "blue"
  icon: "package"
