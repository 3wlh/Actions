name: Actions Remove Files
on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      repos:
        description: "选择要清理的仓库"
        required: false
        type: choice
        options:         
          - "3wlh/OpenWrt_Packages"
          - "3wlh/3wlh.github.io"
          - "3wlh/Script"
          

env:
  repo_url: https://3wlh:${{ secrets.TOKEN_GITHUB }}@github.com/${{ inputs.repos }}

jobs:
  job:
    name: Remove ${{ inputs.repos }} Files
    runs-on: ubuntu-latest
    steps:        
    - name: init
      run : |
        # 初始化数据
        echo "repo_dir=$(mktemp -d)" >> $GITHUB_ENV

    - name: Git Clone Repositories
      working-directory: ${{ env.repo_dir }}
      run : |
        git clone ${{ env.repo_url }} $(pwd)
    
    - name: Git Remove Files
      uses: 3wlh/actions/git/remove-files@main
      with:
        repo_url: ${{ env.repo_url }}
        repo_path: ${{ env.repo_dir }}